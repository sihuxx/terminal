<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>공부 게시판 | Sihoo.dev</title>
  <link rel="stylesheet" href="./style/style.css">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
</head>
<body>
  <header class="header">
    <div class="header-container">
      <div class="logo">Sihoo<span>.dev</span></div>
      <nav class="nav-links">
        <a href="./board.html">게시판</a>
        <a href="./index.html">자기소개</a>
        <a href="./terminal.html">터미널</a>
        <a href="./study.html" class="active">공부 게시판</a>
      </nav>
      <div class="header-user" id="headerUser">
        <a href="./login.html" class="login-link">로그인</a>
      </div>
    </div>
  </header>

  <main class="board-container">

    <!-- LIST VIEW -->
    <div id="listView">
      <div class="board-header">
        <div class="board-title">
          공부 게시판
          <span class="post-count" id="postCount">0 posts</span>
          <span id="adminBadge" class="admin-badge" style="display:none;">✦ 관리자</span>
        </div>
        <button class="btn" id="writeBtn" style="display:none;" onclick="openWriteModal()">+ 글쓰기</button>
      </div>

      <div id="readonlyNotice" class="readonly-notice" style="display:none;">
        이 게시판은 열람만 가능합니다. 글쓰기는 관리자만 허용됩니다.
      </div>

      <div class="post-list" id="postList">
        <div class="state-msg"><span class="loading-dots">불러오는 중</span></div>
      </div>
      <div class="pagination" id="pagination"></div>
    </div>

    <!-- DETAIL VIEW -->
    <div id="detailView" style="display:none;">
      <span class="back-btn" onclick="showList()">← 목록으로</span>
      <div class="post-detail active">
        <div class="post-detail-title" id="detailTitle"></div>
        <div class="post-detail-meta" id="detailMeta"></div>
        <div class="post-detail-body" id="detailBody"></div>
        <div class="post-detail-actions" id="detailActions" style="display:none;">
          <button class="btn btn-sm" onclick="openEditModal()">수정</button>
          <button class="btn btn-sm btn-danger" onclick="confirmDelete()">삭제</button>
        </div>
      </div>
    </div>

  </main>

  <footer class="footer">
    <p>© 2026 Sihoo Park. All rights reserved.</p>
  </footer>

  <!-- WRITE / EDIT MODAL -->
  <div class="modal-overlay" id="writeModal">
    <div class="modal modal-wide">
      <div class="modal-title" id="modalTitle">새 글 작성</div>
      <input type="text" id="postTitleInput" placeholder="제목을 입력하세요..." maxlength="100">
      <input type="text" id="postTagInput" placeholder="태그 (예: JavaScript, React) — 쉼표로 구분" maxlength="80">

      <!-- 마크다운 에디터 -->
      <div class="md-editor-wrap">
        <div class="md-toolbar">
          <button onclick="mdWrap('**','**')"><strong>B</strong></button>
          <button onclick="mdWrap('*','*')"><em>I</em></button>
          <button onclick="mdWrap('~~','~~')"><s>S</s></button>
          <div class="sep"></div>
          <button onclick="mdInsert('# ')">H1</button>
          <button onclick="mdInsert('## ')">H2</button>
          <button onclick="mdInsert('### ')">H3</button>
          <div class="sep"></div>
          <button onclick="mdInsert('- ')">목록</button>
          <button onclick="mdInsert('1. ')">번호</button>
          <button onclick="mdInsert('> ')">인용</button>
          <div class="sep"></div>
          <button onclick="mdWrap('\`','\`')">code</button>
          <button onclick="mdInsert('\`\`\`\n\n\`\`\`')">블록</button>
          <button onclick="mdInsert('---')">—</button>
          <div class="sep"></div>
          <button onclick="mdInsert('[텍스트](url)')">🔗</button>
        </div>
        <div class="md-tabs">
          <button class="md-tab active" onclick="switchMdTab('write')">✍️ 작성</button>
          <button class="md-tab" onclick="switchMdTab('preview')">👁 미리보기</button>
        </div>
        <textarea id="postBodyInput" placeholder="마크다운으로 작성하세요...&#10;&#10;# 제목&#10;**굵게**, *기울게*, `코드`&#10;&#10;```js&#10;console.log('hello')&#10;```"></textarea>
        <div class="md-preview" id="mdPreview"></div>
      </div>

      <!-- 이미지 업로드 -->
      <div>
        <div style="font-size:0.83rem; color:var(--warm-gray); margin-bottom:6px;">이미지 업로드 (드래그 또는 클릭)</div>
        <div class="img-upload-area" id="uploadArea">
          <input type="file" id="imgFileInput" accept="image/*" multiple onchange="handleFileSelect(this.files)">
          📎 클릭하거나 이미지를 드래그해서 올리세요 (최대 5MB)
        </div>
        <div class="upload-progress" id="uploadProgress"></div>
        <div class="img-preview-list" id="imgPreviewList"></div>
      </div>

      <div class="modal-actions">
        <button class="btn btn-outline" onclick="closeModal()">취소</button>
        <button class="btn" id="submitBtn" onclick="submitPost()">작성</button>
      </div>
    </div>
  </div>

  <!-- CONFIRM DELETE -->
  <div class="confirm-overlay" id="confirmModal">
    <div class="confirm-box">
      <p>정말 삭제하시겠습니까?</p>
      <div class="confirm-actions">
        <button class="btn btn-outline" onclick="closeConfirm()">취소</button>
        <button class="btn btn-danger" onclick="deletePost()">삭제</button>
      </div>
    </div>
  </div>

  <!-- 라이트박스 -->
  <div class="lightbox" id="lightbox" onclick="closeLightbox()">
    <span class="lightbox-close">✕</span>
    <img id="lightboxImg" src="" alt="">
  </div>

  <div class="toast" id="toast"></div>

  <script type="module" src="./script/study.js"></script>
</body>
</html>
